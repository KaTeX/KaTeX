<!DOCTYPE html>
<!--To run this example from a clone of the repository, run `yarn start`
    in the root KaTeX directory and then visit with your web browser:
    http://localhost:7936/contrib/a11y-tabindex/index.html
  -->
<html>
  <head>
    <meta charset="UTF-8">
    <title>a11y-tabindex test</title>
    <script src="/katex.js" type="text/javascript"></script>
    <script src="/contrib/auto-render.js" type="text/javascript"></script>
    <script src="/contrib/a11y-tabindex.js" type="text/javascript"></script>
    <style type="text/css">
      body {
          margin: 20px;
          font-size: 18px;
      }

      .narrow {
          max-width: 200px;
          overflow-x: auto;
          border: 1px solid #ccc;
          padding: 4px;
      }
    </style>
  </head>
  <body>
    <h1>a11y-tabindex test</h1>
    <h2>The narrow box below should be keyboard-focusable (Tab to it):</h2>
    <div class="narrow">
      $$\int_{-\infty}^{\infty} e^{-x^2} \, dx = \sqrt{\pi}$$
    </div>
    <h2>This one should not get tabindex (not scrollable):</h2>
    <p>$x^2$</p>
    <script>
      renderMathInElement(document.body);
    </script>
  </body>
</html>
